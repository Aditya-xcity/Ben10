<!-- Question: Create a 2D Omnitrix selector with alien rotation, sounds, GIF transformation, and countdown -->
<!-- Name - ADITYA BHARDWAJ
     Section - D2
     Roll No - 08
     Course – B TECH
     Branch – CSE -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omnitrix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Omnitrix UI -->
    <div class="ring-container">

        <div class="ring" id="ring">
            <img src="images/heatblast.png" class="alien a0">
            <img src="images/Wildmutt.png" class="alien a1">
            <img src="images/Diamondhead.png" class="alien a2">
            <img src="images/XLR8.png" class="alien a3">
            <img src="images/Grey Matter.png" class="alien a4">
            <img src="images/ForeArms.png" class="alien a5">
            <img src="images/Stinkfly.png" class="alien a6">
            <img src="images/Ripjaws.png" class="alien a7">
            <img src="images/Upgrade.png" class="alien a8">
            <img src="images/GhostFreak.png" class="alien a9">
        </div>

        <div class="diamond">
            <img id="centerAlien" src="images/heatblast.png">
        </div>

    </div>

    <!-- Countdown -->
    <div id="countdown">10</div>

    <!-- Transformation GIF -->
    <img id="countdownGif" alt="Transformation">

    <script src="script.js"></script>
</body>
</html>
